x-postgres-migrations: &postgres-migrations
  image: ghcr.io/amacneil/dbmate:latest
  depends_on:
    casino_postgres:
      condition: service_healthy
  networks:
    - casino_net
  environment:
    DBMATE_WAIT: "1"
    DATABASE_URL: postgres://${CASINO_DB_USER:?}:${CASINO_DB_PASS:?}@${CASINO_DB_HOST:?}:${CASINO_DB_PORT:?}/${CASINO_DB_NAME:?}?sslmode=disable&search_path=public
  volumes:
    - ./internal/transactions/adapters/postgres:/db
  restart: on-failure

services:
  casino_api:
    container_name: casino_api
    image: casino:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${CASINO_DB_HOST:-casino_postgres}
      DB_PORT: ${CASINO_DB_PORT:-5432}
      DB_NAME: ${CASINO_DB_NAME:?}
      DB_USER: ${CASINO_DB_USER:?}
      DB_PASS: ${CASINO_DB_PASS:?}
      DB_POOL_MIN: ${CASINO_DB_POOL_MIN:-2}
      DB_POOL_MAX: ${CASINO_DB_POOL_MAX:-10}
      HTTP_PORT: ${CASINO_HTTP_PORT:-8080}
      LOG_LEVEL: ${CASINO_LOG_LEVEL:-info}
      LOG_FORMAT: ${CASINO_LOG_FORMAT:-json}
    depends_on:
      casino_postgres:
        condition: service_healthy
      casino_postgres_migrations_up:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-q"
        - "--spider"
        - "http://localhost:${CASINO_HTTP_PORT:-8080}/v1/health"
      interval: 3s
      timeout: 1s
      retries: 3
      start_period: 3s
    networks:
      - casino_net
    ports:
      - "${CASINO_HTTP_EXPOSED_PORT:-8080}:${CASINO_HTTP_PORT:-8080}"
    command: ["api"]

  casino_consumer:
    container_name: casino_consumer
    image: casino:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${CASINO_DB_HOST:-casino_postgres}
      DB_PORT: ${CASINO_DB_PORT:-5432}
      DB_NAME: ${CASINO_DB_NAME:?}
      DB_USER: ${CASINO_DB_USER:?}
      DB_PASS: ${CASINO_DB_PASS:?}
      DB_POOL_MIN: ${CASINO_DB_POOL_MIN:-2}
      DB_POOL_MAX: ${CASINO_DB_POOL_MAX:-10}
      KAFKA_URL: ${CASINO_KAFKA_HOST:?}:${CASINO_KAFKA_PORT:-9092}
      KAFKA_TOPIC: ${CASINO_KAFKA_TOPIC:-transactions}
      KAFKA_GROUP_ID: ${CASINO_KAFKA_GROUP_ID:-consumer-group}
      LOG_LEVEL: ${CASINO_LOG_LEVEL:-info}
      LOG_FORMAT: ${CASINO_LOG_FORMAT:-json}
      HEALTH_PORT: ${CASINO_CONSUMER_HEALTH_PORT:-8081}
    depends_on:
      casino_postgres:
        condition: service_healthy
      casino_postgres_migrations_up:
        condition: service_completed_successfully
      casino_kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-q"
        - "--spider"
        - "http://localhost:${CASINO_CONSUMER_HEALTH_PORT:-8081}/health"
      interval: 3s
      timeout: 1s
      retries: 3
      start_period: 3s
    networks:
      - casino_net
    command: ["consumer"]

  casino_postgres:
    container_name: casino_postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${CASINO_DB_USER:?}
      POSTGRES_PASSWORD: ${CASINO_DB_PASS:?}
      POSTGRES_DB: ${CASINO_DB_NAME:?}
    volumes:
      - casino_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U ${CASINO_DB_USER:?} -d ${CASINO_DB_NAME:?}"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - casino_net
    restart: unless-stopped

  casino_kafka:
    container_name: casino_kafka
    image: confluentinc/cp-kafka:7.7.8
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 5
    environment:
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN

      # Cluster Identity
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: ${CASINO_KAFKA_CLUSTER_ID:-casino-cluster}

      # Networking
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://casino_kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@casino_kafka:9093

      # Single Node Optimization
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Resources
      KAFKA_HEAP_OPTS: -Xmx1g -Xms1g
    volumes:
      - casino_kafka_data:/var/lib/kafka/data
    networks:
      - casino_net
    restart: unless-stopped

  # This service runs once, creates the topic, then exits
  casino_kafka_init:
    image: apache/kafka:4.2.0
    container_name: casino_kafka_init
    networks:
      - casino_net
    depends_on:
      casino_kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server ${CASINO_KAFKA_HOST:?}:${CASINO_KAFKA_PORT:-9092}
      --create --if-not-exists 
      --topic ${CASINO_KAFKA_TOPIC:-transactions} 
      --partitions ${CASINO_KAFKA_PARTITIONS:-1} 
      --replication-factor ${CASINO_TOPIC_REPLICAS:-1}"
    restart: on-failure

  casino_postgres_migrations_up:
    container_name: casino_postgres_migrations_up
    <<: *postgres-migrations
    command: up

  casino_postgres_migrations_down:
    container_name: casino_postgres_migrations_down
    <<: *postgres-migrations
    command: down
    profiles:
      - rollback

volumes:
  casino_postgres_data:
    driver: local
  casino_kafka_data:
    driver: local

networks:
  casino_net:
    driver: bridge
    name: casino_net
